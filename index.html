<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>て Form Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Mono:wght@400;500&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --paper2: #ede8db;
    --red: #c0392b;
    --green: #1a6644;
    --gold: #b8860b;
    --amber: #d97706;
    --light-red: #fdf0ef;
    --light-green: #edf7f2;
    --light-gold: #fdf8ec;
    --light-amber: #fff8ed;
    --border: rgba(26,20,16,0.15);
    --muted: #7a6e62;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 28px);
  }

  .container { max-width: 520px; margin: 0 auto; }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 0; right: 0;
    height: 1px;
    background: var(--ink);
  }
  .header-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .header-en {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-area {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--paper2);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .score-chips {
    display: flex;
    gap: 6px;
    margin-bottom: 1.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.06em;
    border: 1px solid var(--border);
    background: var(--paper2);
    color: var(--muted);
  }
  .chip.c-perfect  { color: var(--green); border-color: var(--green);  background: var(--light-green); }
  .chip.c-retry    { color: var(--amber); border-color: var(--amber);  background: var(--light-amber); }
  .chip.c-hint     { color: var(--gold);  border-color: var(--gold);   background: var(--light-gold); }
  .chip.c-missed   { color: var(--red);   border-color: var(--red);    background: var(--light-red); }

  .card {
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    padding: 2rem 1.75rem;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 1rem;
    position: relative;
  }

  .card-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .verb-prompt-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hint-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid var(--gold);
    background: var(--light-gold);
    color: var(--gold);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .hint-btn:hover { opacity: 0.75; }
  .hint-btn:disabled { opacity: 0.35; cursor: default; }

  .verb-english {
    font-family: 'Shippori Mincho', serif;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    line-height: 1.2;
  }

  .retry-badge {
    display: inline-block;
    background: var(--light-gold);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    margin-left: 8px;
    vertical-align: middle;
    font-family: 'DM Mono', monospace;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type="text"] {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.25rem;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    background: var(--paper);
    color: var(--ink);
    width: 100%;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input[type="text"]:focus { border-color: var(--ink); }
  input[type="text"].correct-input { border-color: var(--green); background: var(--light-green); color: var(--green); }
  input[type="text"].wrong-input   { border-color: var(--red);   background: var(--light-red);   color: var(--red); }
  input[type="text"].hint-filled   { border-color: var(--gold);  background: var(--light-gold);  color: var(--gold); }

  .field-status { font-size: 16px; width: 20px; flex-shrink: 0; text-align: center; }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 2px;
    border: 1.5px solid var(--ink);
    cursor: pointer;
    transition: all 0.1s;
    background: var(--ink);
    color: var(--paper);
    width: 100%;
    margin-top: 1.5rem;
  }
  .btn:hover  { opacity: 0.85; transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
  .btn:active { transform: translate(2px,2px); box-shadow: none; }
  .btn.outline {
    background: transparent;
    color: var(--ink);
    margin-top: 0.75rem;
  }

  .feedback {
    padding: 1rem 1.25rem;
    border-radius: 2px;
    border: 1.5px solid;
    margin-top: 1.25rem;
    font-size: 13px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
  }
  .feedback.correct { border-color: var(--green); background: var(--light-green); color: var(--green); }
  .feedback.wrong   { border-color: var(--red);   background: var(--light-red);   color: var(--red); }
  .feedback .answer-line {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    display: block;
    margin-top: 4px;
  }

  .stamp {
    position: absolute;
    top: 14px; right: 14px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0;
    transform: rotate(-12deg);
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .stamp.show { opacity: 1; }
  .stamp.correct-stamp { border-color: var(--green); color: var(--green); }
  .stamp.wrong-stamp   { border-color: var(--red);   color: var(--red); }

  /* Done screen */
  .done-screen { padding: 1rem 0 2rem; }
  .done-jp {
    font-family: 'Shippori Mincho', serif;
    font-size: 2.6rem; font-weight: 600;
    margin-bottom: 0.25rem; letter-spacing: 0.1em;
    text-align: center;
  }
  .done-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.75rem; letter-spacing: 0.08em; text-align: center; }

  .tally-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .tally-cell {
    padding: 1rem 0.75rem;
    background: #fff;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .tally-cell:nth-child(odd) { border-right: 1px solid var(--border); }
  .tally-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.9rem; font-weight: 600;
    display: block; margin-bottom: 2px;
  }
  .tally-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .tally-sublabel { font-size: 9px; color: var(--muted); opacity: 0.7; margin-top: 1px; letter-spacing: 0.05em; }

  /* History section */
  .history-section {
    margin-top: 1.5rem;
  }
  .history-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-clear {
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    padding: 0;
  }
  .history-clear:hover { color: var(--red); }
  .history-rows { display: flex; flex-direction: column; gap: 6px; }
  .history-row {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: auto 1fr repeat(4, auto);
    gap: 0 10px;
    align-items: center;
  }
  .h-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .h-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; gap: 1px; }
  .h-seg { height: 100%; }
  .h-seg.s-perfect { background: var(--green); }
  .h-seg.s-retry   { background: var(--amber); }
  .h-seg.s-hint    { background: var(--gold); }
  .h-seg.s-missed  { background: var(--red); }
  .h-num { font-size: 11px; font-weight: 600; }
  .h-num.n-perfect { color: var(--green); }
  .h-num.n-retry   { color: var(--amber); }
  .h-num.n-hint    { color: var(--gold); }
  .h-num.n-missed  { color: var(--red); }

  .legend {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--muted); letter-spacing: 0.04em;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .legend-dot.s-perfect { background: var(--green); }
  .legend-dot.s-retry   { background: var(--amber); }
  .legend-dot.s-hint    { background: var(--gold); }
  .legend-dot.s-missed  { background: var(--red); }

  .no-history { font-size: 12px; color: var(--muted); text-align: center; padding: 1rem 0; }

  /* Sync bar */
  .sync-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--amber); }
  .sync-dot.error { background: var(--red); }
  .sync-text { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100; }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer-panel { position: fixed; left: 0; right: 0; bottom: 0; background: var(--paper); border-top-left-radius: 16px; border-top-right-radius: 16px; border-top: 2px solid var(--ink); padding: 0 1.25rem 2rem; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); z-index: 101; max-height: 85vh; overflow-y: auto; }
  .drawer-panel.open { transform: translateY(0); }
  .drawer-handle { display: flex; justify-content: center; padding: 10px 0 6px; cursor: pointer; }
  .drawer-handle-bar { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }
  .drawer-title { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; }

  /* Stats panel */
  .stats-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stats-counter { font-size: 12px; color: var(--muted); margin-bottom: 12px; letter-spacing: 0.04em; }
  .stats-counter strong { color: var(--ink); font-weight: 600; }
  .stats-list { display: flex; flex-direction: column; gap: 1px; margin-bottom: 1rem; }
  .stats-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #fff;
    border: 1px solid var(--border); border-radius: 3px;
  }
  .stats-row.hidden-row { opacity: 0.5; }
  .stats-verb { flex: 1; min-width: 0; }
  .stats-dict { font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700; display: block; line-height: 1.2; }
  .stats-en { font-size: 10px; color: var(--muted); letter-spacing: 0.03em; display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stats-dots { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .stats-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .stats-dot.s-perfect { background: var(--green); }
  .stats-dot.s-retry   { background: var(--amber); }
  .stats-dot.s-hint    { background: var(--gold); }
  .stats-dot.s-missed  { background: var(--red); }
  .stats-nodata { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; white-space: nowrap; }
  .stats-hide-btn, .stats-unhide-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; cursor: pointer; flex-shrink: 0; border: 1px solid; background: transparent;
  }
  .stats-hide-btn { border-color: var(--muted); color: var(--muted); }
  .stats-hide-btn:hover { border-color: var(--ink); color: var(--ink); }
  .stats-unhide-btn { border-color: var(--green); color: var(--green); }
  .stats-unhide-btn:hover { opacity: 0.7; }
  .stats-hidden-title {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin: 8px 0 8px; padding-top: 8px; border-top: 1px solid var(--border);
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-jp">て形</div>
    <div class="header-en">て-form verb conjugation quiz</div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <div class="sync-text" id="sync-text">Connecting...</div>
  </div>
  <div id="app"></div>
</div>

<!-- Stats drawer -->
<div class="drawer-overlay" id="stats-overlay" onclick="closeStats()"></div>
<div class="drawer-panel" id="stats-panel">
  <div class="drawer-handle" onclick="closeStats()"><div class="drawer-handle-bar"></div></div>
  <div class="drawer-title">Verb Stats</div>
  <div class="stats-legend">
    <div class="legend-item"><div class="legend-dot s-perfect"></div>perfect</div>
    <div class="legend-item"><div class="legend-dot s-retry"></div>retry</div>
    <div class="legend-item"><div class="legend-dot s-hint"></div>hint</div>
    <div class="legend-item"><div class="legend-dot s-missed"></div>missed</div>
  </div>
  <div id="stats-grid"></div>
</div>

<script type="module">

import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ─── FIREBASE ───

  apiKey: "AIzaSyAQIMJprKuaMJPwWtdocSzx1irPpPZNABE",
  authDomain: "japanese-study-tracker.firebaseapp.com",
  databaseURL: "https://japanese-study-tracker-default-rtdb.firebaseio.com",
  projectId: "japanese-study-tracker",
  storageBucket: "japanese-study-tracker.firebasestorage.app",

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, 'quiz');

// ─── VERBS ───
const VERBS = [
  { en: "to eat",           dict: "たべる",   masu: "たべます",   te: "たべて"   },

  { en: "to enter",         dict: "はいる",   masu: "はいります", te: "はいって" },
  { en: "to swim",          dict: "およぐ",   masu: "およぎます", te: "およいで" },
  { en: "to call",          dict: "よぶ",     masu: "よびます",   te: "よんで"   },
  { en: "to understand",    dict: "わかる",   masu: "わかります", te: "わかって" },
  { en: "to teach / show",  dict: "おしえる", masu: "おしえます", te: "おしえて" },

  { en: "to walk",              dict: "あるく",   masu: "あるきます",   te: "あるいて" },
  { en: "to exist (things)",    dict: "ある",     masu: "あります",     te: "あって"   },
  { en: "to exist (people)",    dict: "いる",     masu: "います",       te: "いて"     },
  { en: "to sing",              dict: "うたう",   masu: "うたいます",   te: "うたって" },
  { en: "to end / finish",      dict: "おわる",   masu: "おわります",   te: "おわって" },

  { en: "to make",              dict: "つくる",   masu: "つくります",   te: "つくって" },

  { en: "to take",              dict: "とる",     masu: "とります",     te: "とって"   },
  { en: "to hurry",             dict: "いそぐ",   masu: "いそぎます",   te: "いそいで" },
  { en: "to take off (clothes)",dict: "ぬぐ",     masu: "ぬぎます",     te: "ぬいで"   },
  { en: "to ride",              dict: "のる",     masu: "のります",     te: "のって"   },
  { en: "to work",              dict: "はたらく", masu: "はたらきます", te: "はたらいて"},
  { en: "to hold / have",       dict: "もつ",     masu: "もちます",     te: "もって"   },
];

const TOTAL = 20;
const HIDE_THRESHOLD = 10; // need 10+ attempts before hiding is available
const HIDE_PERFECT_MIN = 9; // need >9 perfects in last 10 to hide

// ─── STATE ───
let fbState = { sessions: [], verbStats: {}, hidden: [] };
let loaded = false;
let saveTimer = null;

let queue = [];
let retryQueue = [];
let current = null;
let qNum = 0;
let counts = { perfect: 0, retry: 0, hint: 0, missed: 0 };
let sessionResults = {}; // dict -> result tier (only first non-retry attempt counts)
let attempts = 0;
let hintUsed = false;
let submitted = false;

// ─── SYNC ───
function setSyncStatus(s, t) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (dot) dot.className = 'sync-dot ' + s;
  if (txt) txt.textContent = t;
}

function scheduleSave() {
  setSyncStatus('syncing', 'Saving...');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    set(stateRef, fbState)
      .then(() => setSyncStatus('synced', 'Saved'))
      .catch(() => setSyncStatus('error', 'Save failed'));
  }, 600);
}

// ─── FIREBASE LISTENER ───
function ensureArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  return Object.values(val);
}

onValue(stateRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    fbState.sessions = ensureArray(data.sessions);
    fbState.verbStats = data.verbStats || {};
    // Normalize each verb's history array
    for (const k of Object.keys(fbState.verbStats)) {
      fbState.verbStats[k] = ensureArray(fbState.verbStats[k]);
    }
    fbState.hidden = ensureArray(data.hidden);
  }
  if (!loaded) {
    loaded = true;
    setSyncStatus('synced', 'Synced');
    showHome();
  } else {
    setSyncStatus('synced', 'Synced');
  }
}, (error) => {
  setSyncStatus('error', 'Connection failed');
  if (!loaded) { loaded = true; showHome(); }
});

// ─── HELPERS ───
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function availableVerbs() {
  const hiddenSet = new Set(fbState.hidden || []);
  return VERBS.filter(v => !hiddenSet.has(v.dict));
}

function buildQueue() {
  const pool = availableVerbs();
  queue = shuffle(pool).slice(0, Math.min(TOTAL, pool.length));
  retryQueue = [];
}

function normalize(s) {
  return s.trim().replace(/\s+/g, '');
}

function verbLookup(dict) {
  return VERBS.find(v => v.dict === dict);
}

function getVerbHistory(dict) {
  const raw = fbState.verbStats[dict];
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  // Firebase may return arrays as objects with numeric keys
  return Object.values(raw);
}

function canHide(dict) {
  const h = getVerbHistory(dict);
  if (h.length < HIDE_THRESHOLD) return false;
  const last10 = h.slice(-10);
  const perfects = last10.filter(r => r === 'perfect').length;
  return perfects >= HIDE_PERFECT_MIN;
}

// ─── RECORD RESULT ───
function recordResult(dict, tier) {
  // Only record the first (non-retry) attempt per verb per session
  if (sessionResults[dict]) return;
  sessionResults[dict] = tier;
}

function commitSessionResults() {
  // Merge sessionResults into fbState.verbStats
  for (const [dict, tier] of Object.entries(sessionResults)) {
    if (!fbState.verbStats[dict]) fbState.verbStats[dict] = [];
    fbState.verbStats[dict].push(tier);
    // Keep last 10 only
    if (fbState.verbStats[dict].length > 10) {
      fbState.verbStats[dict] = fbState.verbStats[dict].slice(-10);
    }
  }
  // Save session summary
  const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  fbState.sessions.unshift({ date: today, ...counts });
  if (fbState.sessions.length > 10) fbState.sessions.pop();

  scheduleSave();
}

// ─── HIDE / UNHIDE ───
window.hideVerb = function(dict) {
  if (!fbState.hidden) fbState.hidden = [];
  if (!fbState.hidden.includes(dict)) {
    fbState.hidden.push(dict);
    scheduleSave();
  }
  renderStats();
};

window.unhideVerb = function(dict) {
  fbState.hidden = (fbState.hidden || []).filter(d => d !== dict);
  scheduleSave();
  renderStats();
};

// ─── QUIZ ACTIONS ───
function nextVerb() {
  if (qNum < queue.length) {
    current = { ...queue[qNum], isRetry: false };
    qNum++;
  } else if (retryQueue.length > 0) {
    current = { ...retryQueue.shift(), isRetry: true };
  } else {
    showDone();
    return;
  }
  attempts = 0;
  hintUsed = false;
  submitted = false;
  renderQuiz();
}

window.useHint = function() {
  const inp = document.getElementById('inp-dict');
  if (!inp || inp.readOnly) return;
  inp.value = current.dict;
  inp.className = 'hint-filled';
  inp.readOnly = true;
  hintUsed = true;
  document.getElementById('hint-btn').disabled = true;
  document.getElementById('inp-masu').focus();
};

window.checkAnswers = function() {
  if (submitted) return;

  const dictInp = document.getElementById('inp-dict');
  const masuInp = document.getElementById('inp-masu');
  const teInp   = document.getElementById('inp-te');

  const dictRaw = normalize(hintUsed ? current.dict : dictInp.value);
  const masuRaw = normalize(masuInp.value);
  const teRaw   = normalize(teInp.value);

  if ((!hintUsed && !normalize(dictInp.value)) || !masuRaw || !teRaw) {
    if (!hintUsed && !normalize(dictInp.value)) dictInp.style.borderColor = '#e8a000';
    if (!masuRaw) masuInp.style.borderColor = '#e8a000';
    if (!teRaw)   teInp.style.borderColor   = '#e8a000';
    return;
  }

  const dictOk = hintUsed || dictRaw === current.dict;
  const masuOk = masuRaw === current.masu;
  const teOk   = teRaw   === current.te;
  const allOk  = dictOk && masuOk && teOk;

  attempts++;

  if (allOk) {
    submitted = true;
    let tier;
    if (hintUsed)            { counts.hint++;    tier = 'hint'; }
    else if (attempts === 1) { counts.perfect++; tier = 'perfect'; }
    else                     { counts.retry++;   tier = 'retry'; }

    recordResult(current.dict, tier);

    styleField(dictInp, 'status-dict', dictOk, hintUsed);
    styleField(masuInp, 'status-masu', masuOk, false);
    styleField(teInp,   'status-te',   teOk,   false);
    lockFields();
    showFeedback('correct');

  } else if (attempts === 1) {
    styleField(dictInp, 'status-dict', dictOk, hintUsed);
    styleField(masuInp, 'status-masu', masuOk, false);
    styleField(teInp,   'status-te',   teOk,   false);

    setTimeout(() => {
      if (!dictOk && !hintUsed) { dictInp.value = ''; dictInp.className = ''; }
      if (!masuOk) { masuInp.value = ''; masuInp.className = ''; }
      if (!teOk)   { teInp.value   = ''; teInp.className   = ''; }
      if (!dictOk && !hintUsed) dictInp.focus();
      else if (!masuOk)          masuInp.focus();
      else                       teInp.focus();
    }, 500);

    showFeedback('try-again');

  } else {
    submitted = true;
    counts.missed++;
    recordResult(current.dict, 'missed');

    styleField(dictInp, 'status-dict', dictOk, hintUsed);
    styleField(masuInp, 'status-masu', masuOk, false);
    styleField(teInp,   'status-te',   teOk,   false);
    lockFields();
    retryQueue.push({ ...current });
    showFeedback('wrong');
  }
};

function styleField(inp, statusId, ok, wasHint) {
  if (wasHint) { inp.className = 'hint-filled'; return; }
  inp.className = ok ? 'correct-input' : 'wrong-input';
  const s = document.getElementById(statusId);
  if (s) s.textContent = ok ? '✓' : '✗';
}

function lockFields() {
  ['inp-dict','inp-masu','inp-te'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.readOnly = true;
  });
  const hbtn = document.getElementById('hint-btn');
  if (hbtn) hbtn.disabled = true;
}

function showFeedback(type) {
  const fbDiv = document.getElementById('feedback');
  const stamp = document.getElementById('stamp');
  const btn   = document.getElementById('submit-btn');

  fbDiv.style.display = 'block';

  if (type === 'try-again') {
    fbDiv.className = 'feedback wrong';
    fbDiv.innerHTML = `<strong>Not quite</strong> — wrong fields cleared. One more try!`;
    return;
  }

  const remaining = (queue.length - qNum) + retryQueue.length;
  const isLast = remaining === 0;

  if (type === 'correct') {
    const tier = hintUsed ? 'hint' : (attempts === 1 ? 'perfect' : 'retry');
    const msgs = {
      perfect: `<strong>正解!</strong> Perfect — first try.`,
      retry:   `<strong>正解!</strong> Correct on the second try.`,
      hint:    `<strong>正解!</strong> Correct — with a hint.`,
    };
    fbDiv.className = 'feedback correct';
    fbDiv.innerHTML = msgs[tier];
    stamp.className = 'stamp correct-stamp show';
    stamp.textContent = '正解';
  } else {
    fbDiv.className = 'feedback wrong';
    fbDiv.innerHTML = `<strong>Incorrect.</strong> The correct answers are:
      <span class="answer-line">Dictionary → <strong>${current.dict}</strong></span>
      <span class="answer-line">ます form &nbsp;→ <strong>${current.masu}</strong></span>
      <span class="answer-line">て form &nbsp;&nbsp;&nbsp;→ <strong>${current.te}</strong></span>
      <br><small style="opacity:0.8">This verb will appear at the end of the deck.</small>`;
    stamp.className = 'stamp wrong-stamp show';
    stamp.textContent = '不正解';
  }

  btn.textContent = isLast ? 'See Results →' : 'Next Verb →';
  btn.onclick = nextVerb;
}

// ── Render quiz card ──────────────────────────────────────────────────────────

function renderQuiz() {
  const pct = Math.min(100, Math.round((qNum - 1) / TOTAL * 100));

  document.getElementById('app').innerHTML = `
    <div class="progress-area">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${qNum} / ${TOTAL}${retryQueue.length > 0 ? ` +${retryQueue.length}` : ''}</div>
    </div>
    <div class="score-chips">
      <div class="chip c-perfect">✓ ${counts.perfect} perfect</div>
      <div class="chip c-retry">↺ ${counts.retry} retry</div>
      <div class="chip c-hint">💡 ${counts.hint} hint</div>
      <div class="chip c-missed">✗ ${counts.missed} missed</div>
    </div>
    <div class="card" id="quiz-card">
      <div class="stamp" id="stamp"></div>

      <div class="card-top-row">
        <div class="verb-prompt-label">Conjugate this verb</div>
        <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Hint</button>
      </div>

      <div class="verb-english">
        ${current.en}${current.isRetry ? ' <span class="retry-badge">retry</span>' : ''}
      </div>

      <div class="field-group">
        <div class="field">
          <div class="field-label">Dictionary Form</div>
          <div class="field-row">
            <input type="text" id="inp-dict" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkAnswers()">
            <div class="field-status" id="status-dict"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label">ます Form</div>
          <div class="field-row">
            <input type="text" id="inp-masu" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkAnswers()">
            <div class="field-status" id="status-masu"></div>
          </div>
        </div>
        <div class="field">
          <div class="field-label">て Form</div>
          <div class="field-row">
            <input type="text" id="inp-te" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkAnswers()">
            <div class="field-status" id="status-te"></div>
          </div>
        </div>
      </div>

      <div id="feedback" style="display:none" class="feedback"></div>
      <button class="btn" id="submit-btn" onclick="checkAnswers()">Submit Answer</button>
    </div>
  `;
  document.getElementById('inp-dict').focus();
}

// ── Session history (reusable) ─────────────────────────────────────────────

function renderSessionHistory() {
  const history = fbState.sessions || [];
  if (history.length === 0) return '<div class="no-history">No past sessions yet.</div>';
  return `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot s-perfect"></div>perfect</div>
      <div class="legend-item"><div class="legend-dot s-retry"></div>retry</div>
      <div class="legend-item"><div class="legend-dot s-hint"></div>hint</div>
      <div class="legend-item"><div class="legend-dot s-missed"></div>missed</div>
    </div>
    <div class="history-rows">${history.map(row => {
      return `<div class="history-row">
        <span class="h-date">${row.date}</span>
        <div class="h-bar">
          ${row.perfect ? `<div class="h-seg s-perfect" style="flex:${row.perfect}"></div>` : ''}
          ${row.retry   ? `<div class="h-seg s-retry"   style="flex:${row.retry}"></div>` : ''}
          ${row.hint    ? `<div class="h-seg s-hint"    style="flex:${row.hint}"></div>` : ''}
          ${row.missed  ? `<div class="h-seg s-missed"  style="flex:${row.missed}"></div>` : ''}
        </div>
        <span class="h-num n-perfect">${row.perfect||0}</span>
        <span class="h-num n-retry">${row.retry||0}</span>
        <span class="h-num n-hint">${row.hint||0}</span>
        <span class="h-num n-missed">${row.missed||0}</span>
      </div>`;
    }).join('')}</div>`;
}

// ── Home screen ───────────────────────────────────────────────────────────────

function showHome() {
  const hiddenCount = (fbState.hidden || []).length;
  const poolSize = availableVerbs().length;
  const history = fbState.sessions || [];

  document.getElementById('app').innerHTML = `
    <div class="done-screen">
      <button class="btn" onclick="startQuiz()">Start Quiz →</button>
      <button class="btn outline" onclick="showHistoryScreen()">Session History${history.length > 0 ? ' (' + history.length + ')' : ''}</button>
      <button class="btn outline" onclick="openStats()">Verb Stats${hiddenCount > 0 ? ' · ' + poolSize + ' active' : ''}</button>
    </div>
  `;
}

window.showHome = showHome;

window.showHistoryScreen = function() {
  document.getElementById('app').innerHTML = `
    <div class="done-screen">
      <div class="history-section">
        <div class="history-title"><span>Past sessions</span></div>
        ${renderSessionHistory()}
      </div>
      <button class="btn" style="margin-top:1.5rem" onclick="showHome()">← Back</button>
    </div>
  `;
};

// ── Done screen ───────────────────────────────────────────────────────────────

function showDone() {
  if (typeof showDone._saved === 'undefined') {
    showDone._saved = true;
    commitSessionResults();
  }

  const total = counts.perfect + counts.retry + counts.hint + counts.missed;
  const score = Math.round((counts.perfect + counts.retry * 0.6 + counts.hint * 0.4) / total * 100);
  let grade, gradeJp;
  if (score >= 85)      { grade = 'Excellent!';        gradeJp = '優秀'; }
  else if (score >= 65) { grade = 'Good work';          gradeJp = 'よくできました'; }
  else if (score >= 45) { grade = 'Keep practicing';    gradeJp = '練習を続けて'; }
  else                  { grade = 'Review the て form'; gradeJp = '復習しましょう'; }

  const hiddenCount = (fbState.hidden || []).length;
  const poolSize = availableVerbs().length;

  document.getElementById('app').innerHTML = `
    <div class="done-screen">
      <div class="done-jp">${gradeJp}</div>
      <div class="done-sub">${grade}</div>

      <div class="tally-grid">
        <div class="tally-cell">
          <span class="tally-num" style="color:var(--green)">${counts.perfect}</span>
          <span class="tally-label">Perfect</span>
          <div class="tally-sublabel">first try, no hint</div>
        </div>
        <div class="tally-cell">
          <span class="tally-num" style="color:var(--amber)">${counts.retry}</span>
          <span class="tally-label">Retry</span>
          <div class="tally-sublabel">correct on 2nd try</div>
        </div>
        <div class="tally-cell">
          <span class="tally-num" style="color:var(--gold)">${counts.hint}</span>
          <span class="tally-label">Hint</span>
          <div class="tally-sublabel">used the hint</div>
        </div>
        <div class="tally-cell">
          <span class="tally-num" style="color:var(--red)">${counts.missed}</span>
          <span class="tally-label">Missed</span>
          <div class="tally-sublabel">wrong twice</div>
        </div>
      </div>

      <div class="history-section">
        <div class="history-title">
          <span>Past sessions</span>
        </div>
        ${renderSessionHistory()}
      </div>

      <button class="btn" style="margin-top:1.5rem" onclick="startQuiz()">Retake Quiz →</button>
      <button class="btn outline" onclick="showHome()">← Home</button>
      <button class="btn outline" onclick="openStats()">Verb Stats${hiddenCount > 0 ? ' · ' + poolSize + ' active' : ''}</button>
    </div>
  `;
}

// ── Stats panel ───────────────────────────────────────────────────────────────

window.openStats = function() { renderStats(); document.getElementById('stats-overlay').classList.add('open'); document.getElementById('stats-panel').classList.add('open'); };
window.closeStats = function() { document.getElementById('stats-overlay').classList.remove('open'); document.getElementById('stats-panel').classList.remove('open'); };

function renderStats() {
  const hiddenSet = new Set(fbState.hidden || []);
  const active = VERBS.filter(v => !hiddenSet.has(v.dict));
  const hidden = VERBS.filter(v => hiddenSet.has(v.dict));

  // Sort active: verbs with worst performance first, then no data, then best
  active.sort((a, b) => {
    const ha = getVerbHistory(a.dict), hb = getVerbHistory(b.dict);
    if (ha.length === 0 && hb.length === 0) return 0;
    if (ha.length === 0) return 1;
    if (hb.length === 0) return -1;
    const scoreA = ha.filter(r => r === 'perfect').length / ha.length;
    const scoreB = hb.filter(r => r === 'perfect').length / hb.length;
    return scoreA - scoreB;
  });

  let html = '';

  // Active verbs
  html += '<div class="stats-counter"><strong>' + active.length + '</strong> active verbs' + (hidden.length > 0 ? ' · <strong>' + hidden.length + '</strong> hidden' : '') + '</div>';

  html += '<div class="stats-list">';
  for (const v of active) {
    const hist = getVerbHistory(v.dict);
    const ch = canHide(v.dict);
    html += '<div class="stats-row">';
    html += '<div class="stats-verb"><span class="stats-dict">' + v.dict + '</span><span class="stats-en">' + v.en + '</span></div>';
    html += '<div class="stats-dots">';
    if (hist.length === 0) {
      html += '<span class="stats-nodata">no data</span>';
    } else {
      for (const r of hist) {
        const cls = r === 'perfect' ? 's-perfect' : r === 'retry' ? 's-retry' : r === 'hint' ? 's-hint' : 's-missed';
        html += '<div class="stats-dot ' + cls + '"></div>';
      }
    }
    html += '</div>';
    if (ch) {
      html += '<button class="stats-hide-btn" onclick="hideVerb(\'' + v.dict + '\')">hide</button>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Hidden verbs
  if (hidden.length > 0) {
    html += '<div class="stats-hidden-title">Hidden verbs</div>';
    html += '<div class="stats-list">';
    for (const v of hidden) {
      const hist = getVerbHistory(v.dict);
      html += '<div class="stats-row hidden-row">';
      html += '<div class="stats-verb"><span class="stats-dict">' + v.dict + '</span><span class="stats-en">' + v.en + '</span></div>';
      html += '<div class="stats-dots">';
      for (const r of hist) {
        const cls = r === 'perfect' ? 's-perfect' : r === 'retry' ? 's-retry' : r === 'hint' ? 's-hint' : 's-missed';
        html += '<div class="stats-dot ' + cls + '"></div>';
      }
      html += '</div>';
      html += '<button class="stats-unhide-btn" onclick="unhideVerb(\'' + v.dict + '\')">unhide</button>';
      html += '</div>';
    }
    html += '</div>';
  }

  document.getElementById('stats-grid').innerHTML = html;
}

// ── Start ─────────────────────────────────────────────────────────────────────

window.startQuiz = function() {
  qNum = 0;
  counts = { perfect: 0, retry: 0, hint: 0, missed: 0 };
  sessionResults = {};
  attempts = 0;
  hintUsed = false;
  submitted = false;
  delete showDone._saved;
  buildQueue();
  nextVerb();
};

// Show loading state until Firebase connects
document.getElementById('app').innerHTML = '<div style="text-align:center;padding:3rem 0;color:var(--muted);font-size:13px">Connecting...</div>';
</script>
